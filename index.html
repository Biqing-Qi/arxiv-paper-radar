<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily arXiv Paper Radar</title>
    <meta name="description" content="Daily arXiv paper radar for diffusion language models and model architecture.">
    <link rel="stylesheet" href="assets/app.css?v=20260710-db-only">
  </head>
  <body class="auth-locked">
    <section id="auth-gate" class="auth-gate" aria-label="Password gate">
      <form id="auth-form" class="auth-card">
        <p class="eyebrow">Private Radar</p>
        <h1>论文雷达</h1>
        <label class="auth-field">
          <span>访问密码</span>
          <input id="auth-password" type="password" autocomplete="current-password" autofocus>
        </label>
        <button type="submit">进入</button>
        <p id="auth-message" class="auth-message" aria-live="polite"></p>
      </form>
    </section>

    <header class="topbar">
      <div>
        <p class="eyebrow">Daily arXiv Paper Radar</p>
        <h1>论文雷达</h1>
      </div>
      <nav class="nav-actions" aria-label="Links">
        <a href="reports/latest.md">Latest Markdown</a>
        <a href="https://github.com/Biqing-Qi/arxiv-paper-radar">GitHub</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="control-band" aria-label="Controls">
        <div class="metric">
          <span class="metric-label">今日命中</span>
          <strong id="metric-count">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">最高分</span>
          <strong id="metric-score">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">更新时间</span>
          <strong id="metric-updated">--</strong>
        </div>

        <label class="field">
          <span>日期</span>
          <select id="date-select"></select>
        </label>

        <label class="field search-field">
          <span>搜索</span>
          <input id="search-input" type="search" placeholder="标题、作者、关键词">
        </label>
      </section>

      <section class="topic-strip" aria-label="Topic filters">
        <button class="topic-button is-active" type="button" data-topic="all">全部</button>
        <button class="topic-button" type="button" data-topic="Diffusion Language Models">扩散语言模型</button>
        <button class="topic-button" type="button" data-topic="Model Architecture">模型架构</button>
      </section>

      <section class="database-panel database-primary" aria-label="Database views">
        <div class="database-head">
          <div>
            <p class="eyebrow">Database</p>
            <h2>论文雷达数据库</h2>
          </div>
          <div class="database-actions">
            <div class="view-tabs" role="tablist" aria-label="Database views">
              <button class="view-tab is-active" type="button" data-db-view="papers">论文库</button>
              <button class="view-tab" type="button" data-db-view="people">人物库</button>
            </div>
            <a id="database-download" class="download-link" href="data/papers.csv">下载 CSV</a>
          </div>
        </div>
        <div class="database-filterbar" aria-label="Database filters">
          <label>
            <span>关键词筛选</span>
            <select id="database-keyword-filter"></select>
          </label>
          <div id="database-keyword-chips" class="database-keyword-chips"></div>
        </div>
        <div class="database-table-wrap">
          <table class="database-table">
            <thead id="database-head">
              <tr>
                <th>数据库</th>
              </tr>
            </thead>
            <tbody id="database-body">
              <tr>
                <td>正在加载数据库...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="assets/app.js?v=20260710-db-only" defer></script>
  </body>
</html>
