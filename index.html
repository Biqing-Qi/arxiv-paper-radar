<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily arXiv Paper Radar</title>
    <meta name="description" content="Daily arXiv paper radar for diffusion language models and model architecture.">
    <link rel="stylesheet" href="assets/app.css?v=20260710-split-db">
  </head>
  <body class="auth-locked">
    <section id="auth-gate" class="auth-gate" aria-label="Password gate">
      <form id="auth-form" class="auth-card">
        <p class="eyebrow">Private Radar</p>
        <h1>论文雷达</h1>
        <label class="auth-field">
          <span>访问密码</span>
          <input id="auth-password" type="password" autocomplete="current-password" autofocus>
        </label>
        <button type="submit">进入</button>
        <p id="auth-message" class="auth-message" aria-live="polite"></p>
      </form>
    </section>

    <header class="topbar">
      <div>
        <p class="eyebrow">Daily arXiv Paper Radar</p>
        <h1>论文雷达</h1>
      </div>
      <nav class="nav-actions" aria-label="Links">
        <a href="reports/latest.md">Latest Markdown</a>
        <a href="https://github.com/Biqing-Qi/arxiv-paper-radar">GitHub</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="control-band" aria-label="Controls">
        <div class="metric">
          <span class="metric-label">今日命中</span>
          <strong id="metric-count">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">最高分</span>
          <strong id="metric-score">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">更新时间</span>
          <strong id="metric-updated">--</strong>
        </div>

        <label class="field">
          <span>全局日期</span>
          <select id="date-select"></select>
        </label>

        <label class="field search-field">
          <span>全局搜索</span>
          <input id="search-input" type="search" placeholder="论文、作者、机构、方向">
        </label>
      </section>

      <section class="database-panel database-primary" aria-label="Paper database">
        <div class="database-head">
          <div>
            <p class="eyebrow">Paper Database</p>
            <h2>论文库</h2>
          </div>
          <div class="database-actions">
            <a class="download-link" href="data/papers.csv">下载论文 CSV</a>
          </div>
        </div>
        <div class="database-filterbar" aria-label="Database filters">
          <label>
            <span>时间</span>
            <select id="paper-date-filter"></select>
          </label>
          <label>
            <span>研究方向</span>
            <select id="paper-direction-filter"></select>
          </label>
          <div id="paper-direction-chips" class="database-keyword-chips"></div>
        </div>
        <div class="database-table-wrap">
          <table class="database-table">
            <thead id="paper-database-head">
              <tr>
                <th>论文库</th>
              </tr>
            </thead>
            <tbody id="paper-database-body">
              <tr>
                <td>正在加载论文库...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="database-panel" aria-label="People database">
        <div class="database-head">
          <div>
            <p class="eyebrow">People Database</p>
            <h2>人物库</h2>
          </div>
          <div class="database-actions">
            <a class="download-link" href="data/people.csv">下载人物 CSV</a>
          </div>
        </div>
        <div class="database-filterbar people-filterbar" aria-label="People filters">
          <label>
            <span>高校 / 机构</span>
            <select id="people-org-filter"></select>
          </label>
          <label>
            <span>人物搜索</span>
            <input id="people-search" type="search" placeholder="姓名、机构、方向、tags">
          </label>
          <div id="people-org-chips" class="database-keyword-chips"></div>
        </div>
        <div class="database-table-wrap">
          <table class="database-table people-table">
            <thead id="people-database-head">
              <tr>
                <th>人物库</th>
              </tr>
            </thead>
            <tbody id="people-database-body">
              <tr>
                <td>正在加载人物库...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="assets/app.js?v=20260710-split-db" defer></script>
  </body>
</html>
